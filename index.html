<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CG Perícias e Assistência Técnica</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: system-ui, sans-serif;
        background: #f4f6f8;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .card {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 8px 32px rgba(0,0,0,.10);
        padding: 48px 40px;
        text-align: center;
        max-width: 480px;
        width: 90%;
      }
      .card img {
        max-width: 200px;
        margin-bottom: 24px;
      }
      .card h1 {
        font-size: 1.5rem;
        color: #1a1a2e;
        margin-bottom: 10px;
      }
      .card p {
        color: #555;
        margin-bottom: 28px;
        font-size: 1rem;
      }
      a.btn {
        display: inline-block;
        background: #1a6e3c;
        color: #fff;
        padding: 14px 32px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 700;
        font-size: 1rem;
        transition: background 0.2s;
      }
      a.btn:hover { background: #145530; }
    </style>
  </head>
  <body>
    <div class="card">
      <!-- https://1drv.ms/i/c/68e2f37e4d0d6149/IQAhABsulreJS4-lBXyW6eTAAaCUMAIGYU5W3JyqLXXQHA4?e=oAYbGw -->
      <img src="logo.png" alt="CG Perícias" />
      <h1>CG Perícias</h1>
      <p>Acesse o sistema de laudos e perícias</p>
      <!-- https://www-cgpericias-com-br.lovable.app -->
      <a class="btn" href="https://SEU-APP.lovable.app" target="_blank" rel="noopener">
        Acessar o sistema
      </a>
    </div>
  </body>
</html>
